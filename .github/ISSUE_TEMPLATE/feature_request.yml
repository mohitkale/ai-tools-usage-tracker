name: Feature request
description: Propose a focused product or contributor-experience improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and scope
      options:
        - label: This request does not require telemetry, credential enumeration, raw payload storage, or weakening default-deny permissions.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the outcome rather than a large implementation plan.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
